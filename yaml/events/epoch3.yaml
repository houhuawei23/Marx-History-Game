- id: aiReplacesHuman
  name: 人工智能取代人力
  description: 你研发出了通用人工智能（AGI），可以取代90%的工人。效率极高，但剩下的10%工人面临绝境。
  imageKey: ai
  historicalParallel: 当前生成式AI引发的大规模失业焦虑：新一轮技术革命正在重塑劳动市场。
  quote:
    text: '"机器本身缩短劳动时间，但它的资本主义使用却延长工作日。"'
    author: 马克思《资本论》
  type: slider
  slider:
    label: AI 替代比例
    min: 0
    max: 100
    default: 50
    preview: 替代比例越高，财富与技术增长越快，但社会矛盾与工人信任越差
  sliderBase:
    wealth: 50
    conflict: 99
    tech: 30
    routeTag: technologist
    social:
      worker: -20
      gov: -5
      media: -5
      rival: 10
  options:
    - text: 推行机器人税，将利润分配给全民
      wealth: 20
      conflict: -20
      tech: 20
      routeTag: reformer
      social:
        worker: 15
        gov: 10
        media: 10
        rival: 0
    - text: 利用AI进行计划经济，弱化市场调节
      wealth: 0
      conflict: -30
      tech: 30
      routeTag: technologist
      social:
        worker: 5
        gov: 5
        media: 5
        rival: -5
  knowledge: AI时代，资本逻辑非但没有失效，反而强化了。当生产资料高度集中时，资本主义的雇佣劳动关系就瓦解了。

