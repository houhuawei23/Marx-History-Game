  imageKey: stockCrash
  historicalParallel: 1929年华尔街黑色星期四：虚拟资本与实体经济的脱节导致了史无前例的经济大萧条。
  quote:
    text: '"有价证券的资本化是按利息资本计算的。"'
    author: 马克思《资本论》第三卷
  options:
    - text: 抛售资产，裁员止血
      wealth: -10
      conflict: 20
      tech: 0
      routeTag: conservative
      social:
        worker: -20
        gov: -5
        media: -10
        rival: 15
    - text: 联合其他资本家救市
      wealth: -30
      conflict: -5
      tech: 0
      routeTag: reformer
      social:
        worker: 5
        gov: 10
        media: 10
        rival: -10
    - text: 趁低收购竞争对手技术专利
      wealth: -20
      conflict: 5
      tech: 20
      routeTag: technologist
      social:
        worker: 0
        gov: 0
        media: 5
        rival: -15
  knowledge: 虚拟资本的膨胀使经济危机具有了更强的投机性和传染性。金融资本与产业资本的脱节，放大了周期性危机的破坏力。

- id: antitrust
  name: 反垄断法案
  description: 政府出台严厉的反垄断法，你的垄断地位受到威胁。
  imageKey: antitrust
  historicalParallel: 19世纪末20世纪初美国《谢尔曼反托拉斯法》：国家为缓和阶级矛盾而进行的制度调整。
  quote:
    text: '"竞争转变为垄断，而现代社会的全部经济制度都建立在垄断的基础上。"'
    author: 列宁《帝国主义是资本主义的最高阶段》
  options:
    - text: 暗中分化瓦解法案推进
      wealth: -10
      conflict: 15
      tech: 0
      routeTag: conservative
      social:
        worker: -10
        gov: -15
        media: -10
        rival: 10
    - text: 主动拆分，换取社会声誉
      wealth: -20
      conflict: -15
      tech: 0
      routeTag: reformer
      social:
        worker: 10
        gov: 15
        media: 15
        rival: 0
    - text: 以技术专利优势形成新壁垒
      wealth: 10
      conflict: 5
      tech: 15
      routeTag: technologist
      social:
        worker: 0
        gov: -5
        media: 0
        rival: -10
  knowledge: 垄断是资本主义发展到一定阶段的必然产物。国家干预表面上限制垄断，实则是为了维护资本主义制度的长期稳定。

- id: assemblyLineAlgorithm
  name: 流水线与管理算法
  description: 工程师向你展示一套新的管理体系：把工人的经验拆成标准动作，再交给统计表、监督员和奖惩系统执行。流水线开始像一台会思考的机器，而工人更像机器的一部分。
  imageKey: tech
  historicalParallel: 20世纪初福特制与泰罗制的兴起：将复杂的劳动过程分解为简单、可量化的标准动作，极大地提高了生产效率，也加深了工人的异化。
  quote:
    text: '"劳动用机器代替了手工劳动，但是，工人却变成了机器的单纯的附属品。"'
    author: 《共产党宣言》
  options:
    - text: 把经验写成规训手册，全面推广
      wealth: 20
      conflict: 15
      tech: 10
      routeTag: conservative
      social:
        worker: -10
        gov: 0
        media: -5
        rival: 5
    - text: 让工人参与改造流程
      wealth: 5
      conflict: -10
      tech: 10
      routeTag: reformer
      social:
        worker: 10
        gov: 5
        media: 5
        rival: 0
    - text: 保留车间自治，放缓标准化
      wealth: -10
      conflict: -5
      tech: 5
      routeTag: technologist
      social:
        worker: 5
        gov: 0
        media: 5
        rival: -5
  knowledge: 从泰罗制到平台算法，资本不断把活劳动中的知识抽离出来，沉淀为对劳动者的外部控制系统。AI 管理并非凭空出现，而是这一过程的高级形态。
  question: "如果管理本身也被机器化，工人的经验是在消失，还是被夺走?"

- id: telegraphPriceCartel
  name: 跨洋电报与价格同盟
  description: 跨洋电报让你第一次可以在一天之内得知远方市场的报价。同行们提议建立价格同盟，一边共享情报，一边联合压低原料与工资成本。
  imageKey: tech
  historicalParallel: 19世纪中后期跨大西洋电报的铺设：信息传递速度的革命性提升，首先被用于金融投机和垄断资本的国际协调。
  quote:
    text: '"竞争转变为垄断，而现代社会的全部经济制度都建立在垄断的基础上。"'
    author: 列宁
  options:
    - text: 加入同盟，扩大市场控制
      wealth: 30
      conflict: 10
      tech: 10
      routeTag: conservative
      social:
        worker: -10
        gov: -5
        media: -5
        rival: 15
    - text: 只共享物流和库存信息
      wealth: 15
      conflict: 0
      tech: 10
      routeTag: reformer
      social:
        worker: 0
        gov: 5
        media: 5
        rival: 0
    - text: 公开价格信息，防止垄断
      wealth: -10
      conflict: -10
      tech: 5
      routeTag: technologist
      social:
        worker: 5
        gov: 10
        media: 10
        rival: -10
  knowledge: 通信技术并不会自动带来更公平的市场。它同样可能成为资本协调垄断、转嫁危机和压缩劳动成本的工具。
  question: "当信息传递越来越快，受益最大的会是社会协作，还是更有能力操纵市场的资本集团?"

- id: unionLegalization
  name: 工会合法化运动
  description: 工人们要求结社自由，组织工会。你是反对最激烈的厂商之一，但越来越多的工人开始秘密罢工。
  imageKey: strike
  historicalParallel: 1820-1850年代英国工会运动：从《结社法》废除到宪章运动，工人阶级开始以组织形式争取权益。
  quote:
    text: '"无产者在这个革命中失去的只是锁链。他们获得的将是整个世界。"'
    author: 马克思、恩格斯
  options:
    - text: 联合其他厂商对抗工会化
      wealth: 15
      conflict: 25
      tech: 0
      routeTag: conservative
      social:
        worker: -20
        gov: -5
        media: -10
        rival: 10
    - text: 主动谈判，签订集体工资协议
      wealth: -15
      conflict: -15
      tech: 5
      routeTag: reformer
      social:
        worker: 15
        gov: 10
        media: 10
        rival: -5
    - text: 引入半自动设备，削弱工会的关键地位
      wealth: 10
      conflict: 10
      tech: 15
      routeTag: technologist
      social:
        worker: -10
        gov: 0
        media: 5
        rival: 5
  knowledge: 工会是工人阶级组织起来对抗资本的重要形式。但资本家同样可以通过引入机器、转移生产或雇佣工贼来瓦解工会力量。这是劳资之间持续的制度性博弈。

- id: socialistInternational
