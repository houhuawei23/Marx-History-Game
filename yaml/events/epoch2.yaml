  imageKey: tech
  historicalParallel: 第二次工业革命（电力、内燃机、流水线）：垄断资本主义形成的物质基础。
  quote:
    text: '"劳动用机器代替了手工劳动，但是，工人却变成了机器的单纯的附属品。"'
    author: 《共产党宣言》
  type: slider
  slider:
    label: 投资力度
    min: 0
    max: 100
    default: 50
    preview: 根据投资比例决定收益与风险
  sliderBase:
    wealth: -40
    conflict: 10
    tech: 25
    routeTag: technologist
    social:
      worker: -5
      gov: 0
      media: 0
      rival: 5
  options:
    - text: 保守投资，逐步更新
      wealth: -20
      conflict: 5
      tech: 15
      routeTag: reformer
      social:
        worker: 0
        gov: 5
        media: 5
        rival: 0
    - text: 维持现状，不投资
      wealth: 0
      conflict: 0
      tech: 0
      routeTag: conservative
      social:
        worker: 0
        gov: 0
        media: 0
        rival: 5
  knowledge: 生产力决定生产关系。技术革命推动生产力发展，但资本主义生产关系可能成为生产力发展的桎梏。

