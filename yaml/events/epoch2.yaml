# 纪元2事件库 - 工业垄断纪元
# 共12个事件

- id: economicCrisis
  name: 经济危机
  description: 生产的商品堆积如山，但底层工人买不起。库存积压，资金链即将断裂。
  imageKey: crisis
  historicalParallel: 1929年大萧条与2008年金融危机：生产社会化与生产资料私有制矛盾的集中爆发。
  quote:
    text: '"生产过剩的经济危机是资本主义制度的必然伴侣。"'
    author: 恩格斯
  options:
    - text: 销毁库存，维持价格
      wealth: -20
      conflict: 30
      tech: 0
      routeTag: conservative
      social:
        worker: -20
        gov: -5
        media: -10
        rival: 15
    - text: 降价倾销，开拓海外市场
      wealth: -10
      conflict: 0
      tech: 5
      routeTag: technologist
      social:
        worker: 0
        gov: 0
        media: 0
        rival: -10
    - text: 提高工人工资，扩大内需
      wealth: -30
      conflict: -15
      tech: 0
      routeTag: reformer
      social:
        worker: 15
        gov: 10
        media: 10
        rival: 0
  knowledge: 生产社会化与生产资料私有制的基本矛盾。资本主义无法消灭相对过剩人口和消费不足的痼疾。

