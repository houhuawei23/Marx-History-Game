  description: 来自欧洲各国的社会主义者正在秘密筹建「国际工人协会」。马克思和恩格斯是主要领袖。他们主张全世界无产者联合起来。
  imageKey: strike
  historicalParallel: 1864年第一国际成立：国际工人协会（第一国际）在伦敦成立，马克思是实际领袖，推动工人阶级的国际团结。
  quote:
    text: '"全世界无产者，联合起来！"'
    author: 马克思、恩格斯
  options:
    - text: 向政府告发，破坏工人运动
      wealth: 10
