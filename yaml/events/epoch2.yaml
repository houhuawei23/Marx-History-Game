      conflict: 20
      tech: 10
      routeTag: conservative
      social:
        worker: -15
        gov: 15
        media: -10
        rival: 10
    - text: 接受订单但改善工人待遇
      wealth: 30
      conflict: 0
      tech: 5
      routeTag: reformer
      social:
        worker: 5
        gov: 10
        media: 5
        rival: 0
    - text: 研发新型武器技术
      wealth: 20
      conflict: 10
      tech: 25
      routeTag: technologist
      social:
        worker: -5
        gov: 10
        media: 0
        rival: -5
  knowledge: 帝国主义阶段，资本扩张与军事暴力深度绑定。军火资本成为垄断资本的重要组成部分，战争成为资本转嫁危机的手段。

