  knowledge: 第一国际将工人运动从各国的分散行动推向国际联合。马克思主张通过政治斗争夺取国家政权，而巴枯宁等无政府主义者则主张直接推翻一切国家。这一分歧最终导致了第一国际的分裂。

- id: colonialDeindustrialization
  name: 殖民地去工业化
  description: 你的纺织厂产品正在大量出口到殖民地。但那里的本地纺织业正在被你的廉价商品摧毁，大量工匠失业。
  imageKey: colonial
  historicalParallel: 19世纪英国棉纺织品出口摧毁印度传统手工业：达卡等纺织中心的工匠大批失业，英国商品占领印度市场，英国殖民政府保护这种不平等贸易。
  quote:
    text: '"英国在广州设置商馆，以此为据点，在印度种植鸦片，在中国市场销售。"'
    author: 马克思
  options:
    - text: 加大出口，彻底摧毁殖民地本土工业
      wealth: 40
      conflict: 15
      tech: 5
      routeTag: conservative
      social:
        worker: -5
        gov: -5
        media: -5
        rival: 5
    - text: 在殖民地设立工厂，培训当地工人
      wealth: 20
      conflict: -5
      tech: 10
      routeTag: reformer
      social:
        worker: 10
        gov: 10
        media: 5
        rival: -5
    - text: 转移低利润产能，专注高端技术研发
      wealth: 25
      conflict: 0
      tech: 15
      routeTag: technologist
      social:
        worker: 0
        gov: 5
        media: 5
        rival: 0
  knowledge: 殖民地去工业化是宗主国积累资本的重要手段。通过摧毁殖民地的本土手工业，资本主义将殖民地纳入全球商品市场，同时将原材料和劳动力廉价地控制在手中。这是另一形式的原始积累。

- id: crisis1907
  name: 1907年金融危机
  description: 股市突然崩盘，银行挤兑风潮蔓延。你的几家合作银行面临破产，政府希望你们这些大厂商伸出援手。
  imageKey: bankCrisis
  historicalParallel: 1907年美国银行业危机：纽约多家银行因铁路股票投机失败而倒闭，引发全国性的银行挤兑，最终由J.P.摩根牵头组织救市。
  quote:
    text: '"在危机中，商品和它的价值形态（货币）之间的对立发展成绝对矛盾。"'
    author: 马克思《资本论》
  options:
    - text: 拒绝救市，趁乱收购倒闭银行的资产
      wealth: 30
      conflict: 20
      tech: 0
      routeTag: conservative
      social:
        worker: -15
        gov: -10
        media: -10
        rival: 15
    - text: 出资救市，与政府和银行共渡难关
      wealth: -20
      conflict: -10
      tech: 0
      routeTag: reformer
      social:
        worker: 10
        gov: 15
        media: 10
        rival: -5
    - text: 引入现代信用保险和储备金制度
      wealth: -10
      conflict: 0
      tech: 20
      routeTag: technologist
      social:
        worker: 0
        gov: 10
        media: 5
        rival: -5
  knowledge: 1907年的危机暴露了金融资本与产业资本之间的脆弱平衡。J.P.摩根的私人救市行动开启了央行介入的最后贷款人机制，但这种机制同样意味着大资本家的损失由全社会承担。

- id: titanicInsurance
  name: 泰坦尼克号沉没与保险
  description: 泰坦尼克号沉没，船上大批富豪丧生，保险公司面临巨额赔付。你的公司也承保了部分保险，现在面临资金压力。
  imageKey: warOrder
  historicalParallel: 1912年泰坦尼克号海难：当时最大的客运邮轮沉没，造成1517人死亡，保险公司赔付约100万美元（当时巨款）。
  quote:
    text: '"保险制度不过是资本家弥补损失的一种方法罢了。"'
    author: 恩格斯
  options:
    - text: 拒绝足额赔付，利用条款漏洞少赔
      wealth: 20
      conflict: 15
      tech: 0
      routeTag: conservative
      social:
        worker: -5
        gov: -5
        media: -15
        rival: 5
    - text: 全额赔付，维护保险业信誉
      wealth: -30
      conflict: -10
      tech: 0
      routeTag: reformer
      social:
        worker: 5
        gov: 10
        media: 15
        rival: 0
    - text: 开发新的精算模型，提升风险管理
      wealth: -10
      conflict: 0
      tech: 15
      routeTag: technologist
      social:
        worker: 0
        gov: 5
        media: 5
        rival: 0
  knowledge: 保险制度是资本主义将风险社会化的机制之一。个体支付的保费聚集起来，用于补偿少数倒霉者。但在赔付纠纷中，资本方往往拥有信息优势和条款解释权。
