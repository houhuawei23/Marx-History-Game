  name: 工会谈判
  description: 工人联合会力量壮大，他们要求签订集体合同，否则将发动总罢工。
  imageKey: unionNegotiation
  historicalParallel: 20世纪欧美工会运动的兴起：工人阶级通过组织化斗争争取权益的重要历程。
  quote:
    text: '"无产者在这个革命中失去的只是锁链。他们获得的将是整个世界。"'
    author: 马克思、恩格斯
  options:
    - text: 拒绝谈判，分化工会
      wealth: -10
      conflict: 25
      tech: 0
      routeTag: conservative
      social:
        worker: -20
        gov: -5
        media: -10
        rival: 5
    - text: 签订集体合同，提高福利
      wealth: -30
      conflict: -20
      tech: 0
      routeTag: reformer
      social:
        worker: 20
        gov: 10
        media: 10
        rival: -5
    - text: 引入自动化以削弱工会筹码
      wealth: -20
      conflict: 10
      tech: 15
      routeTag: technologist
      social:
        worker: -10
        gov: 0
        media: 0
        rival: 5
  knowledge: 工会运动是工人阶级争取自身权益的重要手段。但在资本主义框架内，集体谈判只能缓和矛盾，无法根除剥削制度本身。
